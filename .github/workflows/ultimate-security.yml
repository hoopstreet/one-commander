name: 🛡️ ULTIMATE SECURITY SCAN

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  security-events: write
  contents: read
  pull-requests: write
  actions: read

jobs:
  security-scan:
    name: 🛡️ Complete Security Scan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # CodeQL Analysis
      - name: 🔍 CodeQL Analysis
        uses: github/codeql-action/init@v3
        with:
          languages: javascript, typescript, python
          queries: security-extended,security-and-quality

      - name: 🔍 CodeQL Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: 🔍 CodeQL Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"

      # Secret Scanning
      - name: 🔑 Gitleaks Secret Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      # Vulnerability Scanning
      - name: 🛡️ Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: 📤 Upload Trivy
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      # Malware Detection
      - name: 🦠 Malware Pattern Detection
        run: |
          echo "🔍 Scanning for malware patterns..."
          SUSPICIOUS=$(grep -r "eval\|exec\|system\|subprocess\|base64" . --include="*.js" --include="*.ts" --include="*.py" --exclude-dir=node_modules --exclude-dir=.git 2>/dev/null | wc -l)
          echo "⚠️ Found $SUSPICIOUS suspicious patterns"
          
      # Python Security
      - name: 🐍 Bandit Security Scan
        uses: jpetrucciani/bandit-check@master
        with:
          path: './src'

      # Dependency Review
      - name: 📦 Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0

      # Security Report
      - name: 📊 Generate Security Report
        run: |
          echo "## 🔒 ULTIMATE SECURITY SCAN COMPLETE" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| CodeQL Analysis | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Scanning | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy Scan | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Malware Detection | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Bandit Scan | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Review | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🛡️ **All security checks passed!**" >> $GITHUB_STEP_SUMMARY
